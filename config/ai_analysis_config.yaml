# config/trading_analysis_config.yaml
# Manual Trading Analysis Input Template
# Fill in qualitative data from news, social media, and research
# This template does NOT use AI - all inputs are manually curated

# =============================================================================
# OVERALL MARKET SENTIMENT (from news headlines, social media trends)
# =============================================================================
overall_sentiment: "neutral"  # Options: bullish, bearish, neutral, uncertain

market_outlook:
  short_term: "sideways"  # 1-3 days: up, down, sideways
  medium_term: "cautious"  # 1-2 weeks: optimistic, pessimistic, cautious
  reasoning: |
    Brief summary of your market view based on:
    - Recent Fed comments
    - Economic data releases
    - Geopolitical events
    - Market trend observations

key_market_factors:
  - name: "Interest Rates"
    impact: "neutral"  # positive, negative, neutral
    description: "Fed holding rates steady, no imminent changes expected"
  - name: "Inflation"
    impact: "positive"
    description: "CPI showing signs of cooling, markets optimistic"
  - name: "Earnings Season"
    impact: "mixed"
    description: "Tech beating estimates, financials missing"

# =============================================================================
# SYMBOL-SPECIFIC ANALYSIS
# =============================================================================
symbols:
  AAPL:
    # ===== YOUR TRADING DECISION =====
    action: "HOLD"  # Options: BUY, SELL, HOLD
    confidence: "medium"  # Options: low, medium, high

    # ===== RISK ASSESSMENT =====
    risk_score: 5  # 1-10 scale (1=safest, 10=riskiest)
    risk_level: "moderate"  # Options: very low, low, moderate, high, very high

    # ===== POSITION SIZING =====
    position_size_pct: 0.0  # Percentage of portfolio to allocate (0-100)
    position_type: null  # Options: null, long, short

    # ===== NEWS ANALYSIS (from sources: Bloomberg, CNBC, WSJ, etc.) =====
    news_sentiment: "mixed"  # Options: positive, negative, mixed, neutral
    recent_headlines:
      - "Apple announces new AI features for iPhone"
      - "China sales concerns persist"
      - "Warren Buffett reduces AAPL stake"
    news_summary: |
      Your analysis of recent news:
      - Product launches driving positive sentiment
      - China weakness remains overhang
      - Institutional investors taking profits

    # ===== SOCIAL MEDIA SENTIMENT =====
    social_sentiment: "bullish"  # Options: bullish, bearish, neutral
    social_sources:
      twitter_x:
        overall_trend: "positive"  # Options: positive, negative, neutral
        key_themes:
          - "Strong iPhone 16 pre-orders"
          - "AI integration excitement"
          - "Services growth momentum"
        influential_accounts:
          - "@tech_analyst: Bullish on AAPL AI strategy"
          - "@market_watch: Concerns about China demand"

      reddit:
        subreddit_sentiment: "positive"  # Options: positive, negative, neutral
        hot_topics:
          - "r/wallstreetbets: AAPL as long-term hold"
          - "r/investing: Discussion on valuation concerns"
          - "r/stocks: Services segment growth analysis"

      stocktwits:
        sentiment_bull_pct: 65  # Percentage of bullish messages
        sentiment_bear_pct: 35  # Percentage of bearish messages
        trend: "increasingly_bullish"  # Options: increasingly_bullish, increasingly_bearish, stable

    # ===== TECHNICAL ANALYSIS (visual/chart-based, not calculated) =====
    technical_assessment:
      trend: "uptrend"  # Options: uptrend, downtrend, sideways, consolidation
      support_zone: "$165-$170"  # Price range where buyers emerge
      resistance_zone: "$180-$185"  # Price range where sellers emerge
      chart_patterns:
        - "Ascending triangle forming"
        - "Price holding above 50-day MA"
      volume_trend: "above_average"  # Options: above_average, below_average, average

    # ===== FUNDAMENTAL ANALYSIS (based on research, not calculated) =====
    fundamental_view:
      valuation: "fair"  # Options: undervalued, fair, overvalued
      earnings_outlook: "positive"  # Options: positive, negative, neutral
      growth_potential: "moderate"  # Options: high, moderate, low
      competitive_position: "strong"  # Options: strong, moderate, weak
      concerns:
        - "China revenue exposure (~20% of sales)"
        - "Slowing iPhone unit sales growth"
        - "Dependence on services for future growth"
      catalysts:
        - "AI-enabled features driving upgrade cycle"
        - "Potential services expansion"
        - "Capital return program (dividends + buybacks)"

    # ===== YOUR REASONING =====
    reasoning: |
      Your comprehensive trading rationale:
      1. Why this action? (BUY/SELL/HOLD)
         - Connect news, social, technical, and fundamental factors

      2. What's your thesis?
         - What scenario would prove you right?

      3. What would prove you wrong?
         - What are the risk factors that could invalidate your view?

      4. Time horizon?
         - Day trade, swing trade, or long-term position?

      5. Entry considerations?
         - Market order or limit order?
         - Ideal entry point?

    # ===== TRADE EXECUTION PARAMETERS =====
    entry_price: null  # Leave null for market, or set limit price
    stop_loss: null  # Price level where you'll exit if wrong
    target_price: null  # Price level where you'll take profit

    # ===== TRADE VALIDATION =====
    ready_to_execute: false  # Set to true when all fields are complete

  # Add more symbols below following the same format
  # MSFT:
  #   action: "BUY"
  #   confidence: "high"
  #   ...

  # NVDA:
  #   action: "HOLD"
  #   confidence: "medium"
  #   ...

  # TSLA:
  #   action: "SELL"
  #   confidence: "low"
  #   ...

# =============================================================================
# PORTFOLIO RISK MANAGEMENT
# =============================================================================
portfolio_risk:
  current_exposure_pct: 15  # Current percentage of portfolio invested
  max_exposure_pct: 20  # Maximum percentage you're willing to risk

  position_limits:
    max_single_position_pct: 10  # Max % of portfolio in one stock
    max_sector_exposure_pct: 25  # Max % of portfolio in one sector

  risk_management_rules:
    - "Always use stop-losses on volatile stocks"
    - "Never risk more than 2% of portfolio on single trade"
    - "Reduce size if conviction is low"
    - "Scale into positions, don't go all-in at once"

  current_risk_factors:
    - name: "Market volatility"
      severity: "medium"  # Options: low, medium, high
      mitigation: "Keep cash buffer, avoid over-leveraging"

    - name: "Earnings season"
      severity: "high"
      mitigation: "Reduce positions ahead of earnings reports"

    - name: "Geopolitical events"
      severity: "low"
      mitigation: "Monitor news, have exit plan"

# =============================================================================
# WATCHLIST (stocks you're tracking but not trading yet)
# =============================================================================
watchlist:
  - symbol: "GOOGL"
    reason: "Watching for breakdown below key support"
    trigger: "Sell if closes below $130"

  - symbol: "AMZN"
    reason: "Potential breakout play on earnings"
    trigger: "Buy if breaks above $160 with volume"

  - symbol: "META"
    reason: "Waiting for pullback to support zone"
    trigger: "Buy if drops to $450-$460 range"

# =============================================================================
# YOUR NOTES & JOURNAL
# =============================================================================
notes: |
  Free-form notes section for:
  - Daily market observations
  - Lessons learned from recent trades
  - Ideas for future research
  - Anything else you want to remember

last_updated: "2025-01-14"  # Date when this config was last updated
version: "1.0"  # Config version for tracking changes
